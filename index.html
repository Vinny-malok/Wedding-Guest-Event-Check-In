<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Check-in</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body{
        margin: 0;
        height: 100vh;
        background: url(barcode system.png) no-repeat center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .camera-box{
        width: 90%;
        max-width: 380px;
        aspect-ratio: 3/4;
        background: rgba(255,255,255,0.9);
        border-radius: 20px;
        margin-top:300px;
        
        display: flex;
        justify-content: center;
        align-items: center;
        
        overflow: hidden;
    }
    #reader{
        width:100%;
        height:100%;
        object-fit: cover;
        border-radius: 20px;
    }
    #reader_dashboard_section{
        display:none;
    }
    #result{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
        color: white;
    }
</style>
</head>
<body>
    <div class="camera-box">
        <div id="reader"></div>
    </div>
    
    <h2>Total Guests Checked In</h2>
    <div class="counter" id="total">0</div>
    
    <div id="result">Ready to scan</div>
</body>
<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzgrzkwVmxDJC6r4FQsRxj8aRAywc94YpsKfsftOByE8ycXlK6yXUTXPjZE69VEahLb/exec";

let isScanning = true;

function onScanSuccess(decodedText) {

    if (!isScanning) return;
    isScanning = false;
    
    fetch(decodedText)
    .then(res => res.text())
    .then(response => {

        let result = document.getElementById("result");
        let total = document.getElementById("total");
        
        let parts = response.split("|");

        if(parts[0] === "SUCCESS") {

            result.innerHTML = " Welcome " + parts[1];
            total.innerText = parts[2] + "/" + parts[3] + " Guests Checked In";

}
else if(parts[0] === "ALREADY") {

    result.innerHTML = "All Guests Already Checked In: " + parts[1];
    
}
else{
    
    result.innerHTML = "Guest Not Found";
    
}

setTimeout(() => {
    result.innerHTML = "Ready to scan";
    isScanning = true;
}, 4000); // 

});
.catch(err => {
    console.error(err);
    isScanning = true;
});
}
    
let scanner;

function startScanner() {
    if (scanner) return; // prevent double start

    scanner = new Html5QrcodeScanner(
        "reader",
        { fps: 20, qrbox: { width: 220, height: 220 } },
        false
    );

    scanner.render(onScanSuccess);
}

startScanner();

function updateLiveCount() {
    fetch(scriptURL + "?action=count")
    .then(res => res.text())
    .then(data => {
        let parts = data.split("|");
        let checked = parts[0];
        let total = parts[1];
        
        document.getElementById("total").innerText = checked + "/" + total;
    })
    .catch(err => console.error("Count error:", err));
}

updateLiveCount();
setInterval(updateLiveCount, 3000);
    
</script>
