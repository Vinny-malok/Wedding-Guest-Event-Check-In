<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Check-in</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body{
        margin: 0;
        height: 100vh;
        background: url(barcode-system.png) no-repeat center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .camera-box{
        width: 90%;
        max-width: 380px;
        aspect-ratio: 3/4;
        background: rgba(255,255,255,0.9);
        border-radius: 20px;
        margin-top:300px;
        
        display: flex;
        justify-content: center;
        align-items: center;
        
        overflow: hidden;
    }
    #reader{
        width:100%;
        height:100%;
        object-fit: cover;
        border-radius: 20px;
        display: block;
    }
    #result{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
        color: white;
    }
</style>
</head>
<body>
    <div class="camera-box">
        <div id="reader"></div>
    </div>
    
    <h2>Total Guests Checked In</h2>
    <div class="counter" id="total">0</div>
    
    <div id="result">Ready to scan</div>
</body>
<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzgrzkwVmxDJC6r4FQsRxj8aRAywc94YpsKfsftOByE8ycXlK6yXUTXPjZE69VEahLb/exec";

let lastScan = "";
let scanLock = false;

function onScanSuccess(decodedText){

    if(scanLock) return;

    scanLock = true;

    console.log("QR CODE:", decodedText);


    let url = scriptURL + "?code=" + encodeURIComponent(decodedText);


    fetch(url)

    .then(response => response.text())

    .then(data => {

        console.log("APPS SCRIPT:", data);


        let result = JSON.parse(data);


if(result.success){

    document.getElementById("result").innerHTML =
    `
    Welcome<br>
    <b>${result.name}</b>
    <br>
    Checked In: ${result.checkedCount}/${result.totalGuests}
    <br>
    Remaining: ${result.remaining}
    `;


}
else{

    document.getElementById("result").innerHTML =
    result.message;

}


        setTimeout(()=>{

            scanLock = false;

            document.getElementById("result").innerHTML =
            "Ready to scan";


        },3000);


    })


    .catch(error=>{

        console.log(error);

        scanLock=false;

    });

}
    
let scanner;

function startScanner() {

    scanner = new Html5QrcodeScanner(
        "reader",
        {
            fps: 10,
            qrbox: {
                width: 250,
                height: 250
            },
            rememberLastUsedCamera: true,
            showTorchButtonIfSupported: true
        },
        false
    );

    scanner.render(
        onScanSuccess,
        function(errorMessage) {
            console.log("Scanner error:", errorMessage);
        }
    );
}

startScanner();
function updateLiveCount() {
    fetch(scriptURL + "?action=count")
    .then(res => res.text())
    .then(data => {
        let parts = data.split("|");
        let checked = parts[0];
        let total = parts[1];
        
        document.getElementById("total").innerText = checked + "/" + total;
    })
    .catch(err => console.error("Count error:", err));
}

updateLiveCount();
setInterval(updateLiveCount, 3000);
    
</script>
