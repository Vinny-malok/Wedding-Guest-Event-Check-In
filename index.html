<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Check-in</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body{
        margin: 0;
        height: 100vh;
        background: url(barcode-system.png) no-repeat center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .camera-box{
        width: 90%;
        max-width: 380px;
        aspect-ratio: 3/4;
        background: rgba(255,255,255,0.9);
        border-radius: 20px;
        margin-top:300px;
        
        display: flex;
        justify-content: center;
        align-items: center;
        
        overflow: hidden;
    }
    #reader{
        width:100%;
        height:100%;
        object-fit: cover;
        border-radius: 20px;
        display: block;
    }
    #result{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
        color: white;
    }
</style>
</head>
<body>
    <div class="camera-box">
        <div id="reader"></div>
    </div>
    
    <h2>Total Guests Checked In</h2>
    <div class="counter" id="total">0</div>
    
    <div id="result">Ready to scan</div>
</body>
<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzgrzkwVmxDJC6r4FQsRxj8aRAywc94YpsKfsftOByE8ycXlK6yXUTXPjZE69VEahLb/exec";

let isScanning = false;

function onScanSuccess(decodedText) {

    if (isScanning) return;
    isScanning = true;

    fetch(scriptURL + "?code=" + encodeURIComponent(decodedText))
    .then(response => response.text())
    .then(data => {

        console.log("Server Response:", data);

        // Remove quotes because Apps Script returns JSON.stringify()
        data = data.replace(/^"|"$/g, "");

        let parts = data.split("|");

        if (parts[0] === "SUCCESS") {

            document.getElementById("result").innerHTML =
                "<h2 style='color:#00ff99'>" + parts[1] + "</h2>";

        }
        else if (parts[0] === "ALREADY") {

            document.getElementById("result").innerHTML =
                "<h2 style='color:orange'>" + parts[1] + "<br>Already Checked In</h2>";

        }
        else {

            document.getElementById("result").innerHTML =
                "<h2 style='color:red'>Guest Not Found</h2>";

        }

    })
    .catch(err => {

        console.error(err);

        document.getElementById("result").innerHTML =
            "<h2 style='color:red'>Connection Error</h2>";

    })
    .finally(() => {

        setTimeout(() => {
            document.getElementById("result").innerHTML = "Ready to Scan";
            isScanning = false;
        }, 3000);

    });

}     
    .catch(error=>{
        
        console.log(error);
        
        document.getElementById("result").innerHTML = "Connection Error";
        
    });
}
    
let scanner;

function startScanner() {

    scanner = new Html5QrcodeScanner(
        "reader",
        {
            fps: 10,
            qrbox: {
                width: 250,
                height: 250
            },
            rememberLastUsedCamera: true,
        },
        false
    );

    scanner.render(
        onScanSuccess,
        function(errorMessage) {
            console.log("Scanner error:", errorMessage);
        }
    );
}

startScanner();
   
</script>
