<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Check-in</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body{
        margin: 0;
        height: 100vh;
        background: url(barcode-system.png) no-repeat center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .camera-box{
        width: 90%;
        max-width: 380px;
        aspect-ratio: 3/4;
        background: rgba(255,255,255,0.9);
        border-radius: 20px;
        margin-top:300px;
        
        display: flex;
        justify-content: center;
        align-items: center;
        
        overflow: hidden;
    }
    #reader{
        width:100%;
        height:100%;
        object-fit: cover;
        border-radius: 20px;
        display: block;
    }
    #result{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
        color: white;
    }
</style>
</head>
<body>

    <div id="result">Ready to scan</div>
</body>

}

function updateLiveCount() {
    fetch(scriptURL + "?action=count")
    .then(res => res.text())
    .then(data => {
        let parts = data.split("|");
        let checked = parts[0];
        let total = parts[1];
        
        document.getElementById("total").innerText = checked + "/" + total;
    })
    .catch(err => console.error("Count error:", err));
}

updateLiveCount();
setInterval(updateLiveCount, 3000);
    
</script>
