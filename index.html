<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Check-in</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body{
        margin: 0;
        height: 100vh;
        background: url(barcode-system.png) no-repeat center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .camera-box{
        width: 90%;
        max-width: 380px;
        aspect-ratio: 3/4;
        background: rgba(255,255,255,0.9);
        border-radius: 20px;
        margin-top:300px;
        
        display: flex;
        justify-content: center;
        align-items: center;
        
        overflow: hidden;
    }
    #reader{
        width:100%;
        height:100%;
        object-fit: cover;
        border-radius: 20px;
        display: block;
    }
    #result{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
        color: white;
    }
</style>
</head>
<body>
    <div class="camera-box">
        <div id="reader"></div>
    </div>
    
    <h2>Total Guests Checked In</h2>
    <div class="counter" id="total">0</div>
    
    <div id="result">Ready to scan</div>
</body>
<script>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzgrzkwVmxDJC6r4FQsRxj8aRAywc94YpsKfsftOByE8ycXlK6yXUTXPjZE69VEahLb/exec";

let scanner;
let scanning = false;

function onScanSuccess(decodedText){

    if(scanning) return;

    scanning = true;

    console.log("QR:", decodedText);

    fetch(scriptURL + "?code=" + encodeURIComponent(decodedText))

    .then(res => res.text())

    .then(data => {

        console.log("Server:", data);

        // Remove quotation marks from JSON.stringify()
        data = data.replace(/^"|"$/g,"");

        let parts = data.split("|");

        if(parts[0] == "SUCCESS"){

            document.getElementById("result").innerHTML =
            "<div style='font-size:32px;color:#00ff88;font-weight:bold'>WELCOME</div>"
            +"<div style='font-size:28px;margin-top:10px'>"
            +parts[1]+
            "</div>";

        }

        else if(parts[0] == "ALREADY"){

            document.getElementById("result").innerHTML =
            "<div style='font-size:28px;color:orange'>Already Checked In</div>"
            +"<div style='font-size:24px'>"+parts[1]+"</div>";

        }

        else{

            document.getElementById("result").innerHTML =
            "<div style='font-size:30px;color:red'>Guest Not Found</div>";

        }

    })

    .catch(err=>{

        console.error(err);

        document.getElementById("result").innerHTML =
        "<div style='color:red'>Connection Error</div>";

    })

    .finally(()=>{

        setTimeout(()=>{

            document.getElementById("result").innerHTML="Ready to scan";

            scanning=false;

        },3000);

    });

}

function startScanner(){

    scanner = new Html5QrcodeScanner(
        "reader",
        {
            fps:10,
            qrbox:{
                width:250,
                height:250
            }
        },
        false
    );

    scanner.render(
        onScanSuccess,
        function(error){}
    );

}

startScanner();

</script>
